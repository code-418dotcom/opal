version: '3.8'

services:
  web-api:
    build:
      context: .
      dockerfile: src/web_api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - STORAGE_BACKEND=${STORAGE_BACKEND:-azure}
      - STORAGE_ACCOUNT_NAME=${STORAGE_ACCOUNT_NAME}
      - SERVICEBUS_NAMESPACE=${SERVICEBUS_NAMESPACE}
      - QUEUE_BACKEND=${QUEUE_BACKEND:-servicebus}
      - API_KEYS=${API_KEYS}
      - BACKGROUND_REMOVAL_PROVIDER=${BACKGROUND_REMOVAL_PROVIDER:-rembg}
      - IMAGE_GEN_PROVIDER=${IMAGE_GEN_PROVIDER:-fal}
      - UPSCALE_PROVIDER=${UPSCALE_PROVIDER:-realesrgan}
      - UPSCALE_ENABLED=${UPSCALE_ENABLED:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - REMOVEBG_API_KEY=${REMOVEBG_API_KEY}
      - FAL_API_KEY=${FAL_API_KEY}
      - REPLICATE_API_KEY=${REPLICATE_API_KEY}
      - HUGGINGFACE_API_KEY=${HUGGINGFACE_API_KEY}
      - ENTRA_TENANT_ID=${ENTRA_TENANT_ID}
      - ENTRA_CLIENT_ID=${ENTRA_CLIENT_ID}
      - ENTRA_ISSUER=${ENTRA_ISSUER}
      - MOLLIE_API_KEY=${MOLLIE_API_KEY}
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL}
      - SHOPIFY_API_KEY=${SHOPIFY_API_KEY}
      - SHOPIFY_API_SECRET=${SHOPIFY_API_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  pipeline-worker:
    build:
      context: .
      dockerfile: src/pipeline_worker/Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - STORAGE_BACKEND=${STORAGE_BACKEND:-azure}
      - STORAGE_ACCOUNT_NAME=${STORAGE_ACCOUNT_NAME}
      - SERVICEBUS_NAMESPACE=${SERVICEBUS_NAMESPACE}
      - QUEUE_BACKEND=${QUEUE_BACKEND:-servicebus}
      - BACKGROUND_REMOVAL_PROVIDER=${BACKGROUND_REMOVAL_PROVIDER:-rembg}
      - IMAGE_GEN_PROVIDER=${IMAGE_GEN_PROVIDER:-fal}
      - UPSCALE_PROVIDER=${UPSCALE_PROVIDER:-realesrgan}
      - UPSCALE_ENABLED=${UPSCALE_ENABLED:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - REMOVEBG_API_KEY=${REMOVEBG_API_KEY}
      - FAL_API_KEY=${FAL_API_KEY}
      - REPLICATE_API_KEY=${REPLICATE_API_KEY}
      - HUGGINGFACE_API_KEY=${HUGGINGFACE_API_KEY}
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      - web-api

  export-worker:
    build:
      context: .
      dockerfile: src/export_worker/Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - STORAGE_BACKEND=${STORAGE_BACKEND:-azure}
      - STORAGE_ACCOUNT_NAME=${STORAGE_ACCOUNT_NAME}
      - SERVICEBUS_NAMESPACE=${SERVICEBUS_NAMESPACE}
      - QUEUE_BACKEND=${QUEUE_BACKEND:-servicebus}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      - web-api
