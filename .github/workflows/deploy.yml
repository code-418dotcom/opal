name: Deploy Opal

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: dev
        type: choice
        options: [dev, prod]
      scope:
        description: "Deployment scope"
        required: true
        default: all
        type: choice
        options: [all, infra-only, apps-only]
  push:
    branches: [main]
    paths:
      - "src/**"
      - "migrations/**"
      - "shopify-app/**"

permissions:
  id-token: write
  contents: read

env:
  # For push events: always dev. For manual: use input.
  ENV_NAME: ${{ github.event_name == 'push' && 'dev' || inputs.environment }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ─── Resolve environment name for downstream jobs ───
  resolve:
    name: Resolve environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      scope: ${{ steps.env.outputs.scope }}
    steps:
      - id: env
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "environment=dev" >> "$GITHUB_OUTPUT"
            echo "scope=apps-only" >> "$GITHUB_OUTPUT"
          else
            echo "environment=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
            echo "scope=${{ inputs.scope }}" >> "$GITHUB_OUTPUT"
          fi

  # ─── Detect what changed (push events only) ───
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      shared: ${{ steps.filter.outputs.shared }}
      web_api: ${{ steps.filter.outputs.web_api }}
      pipeline_worker: ${{ steps.filter.outputs.pipeline_worker }}
      export_worker: ${{ steps.filter.outputs.export_worker }}
      billing_service: ${{ steps.filter.outputs.billing_service }}
      shopify_app: ${{ steps.filter.outputs.shopify_app }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            shared:
              - 'src/shared/**'
            web_api:
              - 'src/web_api/**'
            pipeline_worker:
              - 'src/pipeline_worker/**'
            export_worker:
              - 'src/export_worker/**'
            billing_service:
              - 'src/billing_service/**'
            shopify_app:
              - 'shopify-app/**'

  # ─── Deploy Infrastructure (Bicep) ───
  infra:
    name: Infrastructure
    runs-on: ubuntu-latest
    needs: [resolve]
    if: >-
      github.event_name == 'workflow_dispatch' &&
      (inputs.scope == 'all' || inputs.scope == 'infra-only')
    environment: ${{ needs.resolve.outputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create Resource Group
        run: |
          set -euo pipefail
          az group create --name "opal-${ENV_NAME}-rg" --location westeurope -o jsonc

      - name: Deploy Bicep
        run: |
          set -euo pipefail
          sudo apt-get update -qq && sudo apt-get install -y -qq jq

          PARAMS_FILE="infra/env/${ENV_NAME}.json"
          jq ".parameters.postgresAdminPassword.value = \"${{ secrets.POSTGRES_ADMIN_PASSWORD }}\"" \
            "${PARAMS_FILE}" > infra/_params.json

          az deployment group create \
            --resource-group "opal-${ENV_NAME}-rg" \
            --template-file infra/main.bicep \
            --parameters @infra/_params.json \
            --query "properties.outputs" \
            -o json | tee /tmp/infra_outputs.json

          echo "===== Infrastructure Outputs ====="
          cat /tmp/infra_outputs.json

  # ─── Build & Push Docker Images ───
  build:
    name: Build images
    runs-on: ubuntu-latest
    needs: [resolve, changes, infra]
    if: >-
      always() &&
      needs.resolve.result == 'success' &&
      (needs.infra.result == 'success' || needs.infra.result == 'skipped') &&
      (needs.resolve.outputs.scope == 'all' || needs.resolve.outputs.scope == 'apps-only')

    steps:
      - uses: actions/checkout@v4

      - name: Decide what to build
        id: decide
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "push" ]; then
            SHARED="${{ needs.changes.outputs.shared }}"
            WEB_API="${{ needs.changes.outputs.web_api }}"
            PIPELINE="${{ needs.changes.outputs.pipeline_worker }}"
            EXPORT="${{ needs.changes.outputs.export_worker }}"
            BILLING="${{ needs.changes.outputs.billing_service }}"
            SHOPIFY="${{ needs.changes.outputs.shopify_app }}"

            # If shared changed, rebuild all Python services
            if [ "${SHARED}" = "true" ]; then
              WEB_API=true; PIPELINE=true; EXPORT=true; BILLING=true
            fi
          else
            # Manual trigger: build everything
            WEB_API=true; PIPELINE=true; EXPORT=true; BILLING=true; SHOPIFY=true
          fi

          echo "web_api=${WEB_API:-false}" >> "$GITHUB_OUTPUT"
          echo "pipeline_worker=${PIPELINE:-false}" >> "$GITHUB_OUTPUT"
          echo "export_worker=${EXPORT:-false}" >> "$GITHUB_OUTPUT"
          echo "billing_service=${BILLING:-false}" >> "$GITHUB_OUTPUT"
          echo "shopify_app=${SHOPIFY:-false}" >> "$GITHUB_OUTPUT"

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Discover ACR
        run: |
          set -euo pipefail
          RG="opal-${ENV_NAME}-rg"
          ACR_NAME=$(az acr list -g "${RG}" --query "[0].name" -o tsv)
          [ -n "${ACR_NAME}" ] || { echo "ERROR: No ACR in ${RG}"; exit 1; }
          ACR_LOGIN=$(az acr show -n "${ACR_NAME}" -g "${RG}" --query "loginServer" -o tsv)
          echo "ACR_NAME=${ACR_NAME}" >> "$GITHUB_ENV"
          echo "ACR_LOGIN=${ACR_LOGIN}" >> "$GITHUB_ENV"

      - name: Login to ACR
        run: az acr login --name "${ACR_NAME}"

      - uses: docker/setup-buildx-action@v3

      - name: Build & push images
        run: |
          set -euo pipefail

          build_push () {
            local NAME="$1" DOCKERFILE="$2"
            echo "Building ${NAME} using ${DOCKERFILE}"
            docker buildx build --platform linux/amd64 \
              -t "${ACR_LOGIN}/${NAME}:${IMAGE_TAG}" \
              -t "${ACR_LOGIN}/${NAME}:latest" \
              -f "${DOCKERFILE}" . --push
          }

          [ "${{ steps.decide.outputs.web_api }}" = "true" ] && \
            build_push "opal/web-api" "src/web_api/Dockerfile"

          [ "${{ steps.decide.outputs.pipeline_worker }}" = "true" ] && \
            build_push "opal/pipeline-worker" "src/pipeline_worker/Dockerfile"

          [ "${{ steps.decide.outputs.export_worker }}" = "true" ] && \
            build_push "opal/export-worker" "src/export_worker/Dockerfile"

          [ "${{ steps.decide.outputs.billing_service }}" = "true" ] && \
            build_push "opal/billing-service" "src/billing_service/Dockerfile"

          [ "${{ steps.decide.outputs.shopify_app }}" = "true" ] && \
            build_push "opal/shopify-app" "shopify-app/Dockerfile"

          echo "Build phase complete."

    outputs:
      web_api: ${{ steps.decide.outputs.web_api }}
      pipeline_worker: ${{ steps.decide.outputs.pipeline_worker }}
      export_worker: ${{ steps.decide.outputs.export_worker }}
      billing_service: ${{ steps.decide.outputs.billing_service }}
      shopify_app: ${{ steps.decide.outputs.shopify_app }}

  # ─── Deploy to Container Apps ───
  deploy:
    name: Deploy apps
    runs-on: ubuntu-latest
    needs: [resolve, build, infra]
    if: >-
      always() &&
      needs.build.result == 'success' &&
      (needs.infra.result == 'success' || needs.infra.result == 'skipped')
    environment: ${{ needs.resolve.outputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install tools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq

      - name: Discover Azure resources
        run: |
          set -euo pipefail
          RG="opal-${ENV_NAME}-rg"

          ACR_NAME=$(az acr list -g "${RG}" --query "[0].name" -o tsv)
          [ -n "${ACR_NAME}" ] || { echo "ERROR: No ACR in ${RG}"; exit 1; }
          ACR_LOGIN=$(az acr show -n "${ACR_NAME}" -g "${RG}" --query "loginServer" -o tsv)
          ACR_ID=$(az acr show -n "${ACR_NAME}" -g "${RG}" --query "id" -o tsv)

          STORAGE=$(az storage account list -g "${RG}" --query "[0].name" -o tsv)
          [ -n "${STORAGE}" ] || { echo "ERROR: No Storage Account in ${RG}"; exit 1; }

          SB=$(az servicebus namespace list -g "${RG}" --query "[0].name" -o tsv)
          [ -n "${SB}" ] || { echo "ERROR: No Service Bus in ${RG}"; exit 1; }
          SB_ID=$(az servicebus namespace show -g "${RG}" -n "${SB}" --query id -o tsv)

          KV=$(az keyvault list -g "${RG}" --query "[0].name" -o tsv)
          [ -n "${KV}" ] || { echo "ERROR: No Key Vault in ${RG}"; exit 1; }
          KV_ID=$(az keyvault show -g "${RG}" -n "${KV}" --query id -o tsv)

          # Prefer VNet-enabled CAE (name ends with -cae-v) if it exists, otherwise first CAE
          CAE=$(az containerapp env list -g "${RG}" --query "[?ends_with(name, '-cae-v')].name | [0]" -o tsv 2>/dev/null)
          if [ -z "${CAE}" ]; then
            CAE=$(az containerapp env list -g "${RG}" --query "[0].name" -o tsv)
          fi
          [ -n "${CAE}" ] || { echo "ERROR: No Container Apps Environment in ${RG}"; exit 1; }

          PG_SERVER=$(az resource list -g "${RG}" \
            --resource-type "Microsoft.DBforPostgreSQL/flexibleServers" \
            --query "[0].name" -o tsv)
          [ -n "${PG_SERVER}" ] || { echo "ERROR: No Postgres in ${RG}"; exit 1; }

          REDIS_NAME=$(az redis list -g "${RG}" --query "[0].name" -o tsv 2>/dev/null || true)
          REDIS_HOST=""
          if [ -n "${REDIS_NAME}" ]; then
            REDIS_HOST=$(az redis show -g "${RG}" -n "${REDIS_NAME}" --query "hostName" -o tsv)
          fi

          for VAR in ACR_NAME ACR_LOGIN ACR_ID STORAGE SB SB_ID KV KV_ID CAE PG_SERVER REDIS_NAME REDIS_HOST; do
            echo "${VAR}=${!VAR}" >> "$GITHUB_ENV"
          done
          echo "RG=${RG}" >> "$GITHUB_ENV"

      - name: Whitelist runner IP on Postgres firewall
        run: |
          set -euo pipefail
          RUNNER_IP=$(curl -s https://api.ipify.org)
          echo "RUNNER_IP=${RUNNER_IP}" >> "$GITHUB_ENV"
          echo "Adding runner IP ${RUNNER_IP} to Postgres firewall..."
          az postgres flexible-server firewall-rule create \
            -g "${RG}" -n "${PG_SERVER}" \
            --rule-name "GHActions-${GITHUB_RUN_ID}" \
            --start-ip-address "${RUNNER_IP}" --end-ip-address "${RUNNER_IP}" \
            -o none

      - name: Run DB migrations
        env:
          PGPASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
        run: |
          set -euo pipefail
          PG_HOST="${PG_SERVER}.postgres.database.azure.com"
          echo "Running migrations against ${PG_HOST}..."
          for SQL_FILE in migrations/*.sql; do
            echo "  Applying ${SQL_FILE}..."
            psql "host=${PG_HOST} port=5432 dbname=opal user=opaladmin sslmode=require" \
              -f "${SQL_FILE}" -v ON_ERROR_STOP=1
          done

      - name: Remove runner IP from Postgres firewall
        if: always()
        run: |
          az postgres flexible-server firewall-rule delete \
            -g "${RG}" -n "${PG_SERVER}" \
            --rule-name "GHActions-${GITHUB_RUN_ID}" --yes -o none 2>/dev/null || true

      - name: Ensure Service Bus queues
        run: |
          set -euo pipefail
          for Q in jobs exports bg-removal scene-gen upscale; do
            az servicebus queue show -g "${RG}" --namespace-name "${SB}" --name "${Q}" >/dev/null 2>&1 || \
              az servicebus queue create -g "${RG}" --namespace-name "${SB}" --name "${Q}" \
                --max-delivery-count 5 --lock-duration PT5M --default-message-time-to-live P7D
          done

      - name: Open Storage firewall for runner
        run: |
          set -euo pipefail
          # Ensure storage is accessible (Allow until Container Apps are in VNet)
          az storage account update -g "${RG}" -n "${STORAGE}" \
            --default-action Allow -o none 2>/dev/null || true
          sleep 5

      - name: Ensure blob containers
        run: |
          set -euo pipefail
          for C in raw outputs exports; do
            az storage container show --account-name "${STORAGE}" --name "${C}" --auth-mode login >/dev/null 2>&1 || \
              az storage container create --account-name "${STORAGE}" --name "${C}" --auth-mode login --public-access off
          done

      - name: Refresh Azure auth (pre-seed)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Seed Key Vault secrets
        env:
          DB_PASS: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
        run: |
          set -euo pipefail
          echo "Seeding secrets into Key Vault ${KV}..."

          seed_secret () {
            local NAME="$1" VALUE="$2"
            if [ -z "${VALUE}" ]; then
              echo "  SKIP ${NAME} (empty)"
              return 0
            fi
            az keyvault secret set --vault-name "${KV}" --name "${NAME}" \
              --value "${VALUE}" -o none 2>/dev/null || \
              echo "  WARN: Could not set ${NAME}"
          }

          PG_HOST="${PG_SERVER}.postgres.database.azure.com"
          DB_URL="postgresql+psycopg://opaladmin:${DB_PASS}@${PG_HOST}:5432/opal?sslmode=require"

          seed_secret "database-url"       "${DB_URL}"
          seed_secret "fal-api-key"        "${{ secrets.FAL_API_KEY }}"
          seed_secret "aml-endpoint-url"   "${{ secrets.AML_ENDPOINT_URL }}"
          seed_secret "aml-endpoint-key"   "${{ secrets.AML_ENDPOINT_KEY }}"
          seed_secret "mollie-api-key"     "${{ secrets.MOLLIE_API_KEY }}"
          seed_secret "shopify-api-key"    "${{ secrets.SHOPIFY_API_KEY }}"
          seed_secret "shopify-api-secret" "${{ secrets.SHOPIFY_API_SECRET }}"
          seed_secret "encryption-key"     "${{ secrets.ENCRYPTION_KEY }}"
          seed_secret "api-keys"           "${{ secrets.API_KEYS }}"
          seed_secret "entra-tenant-id"    "${{ secrets.ENTRA_TENANT_ID }}"
          seed_secret "entra-client-id"    "${{ secrets.ENTRA_CLIENT_ID }}"
          seed_secret "entra-issuer"       "${{ secrets.ENTRA_ISSUER }}"
          seed_secret "opal-service-key"   "${{ secrets.OPAL_SERVICE_KEY }}"

          if [ -n "${REDIS_NAME}" ]; then
            REDIS_KEY=$(az redis list-keys -g "${RG}" -n "${REDIS_NAME}" --query "primaryKey" -o tsv)
            seed_secret "redis-url" "rediss://:${REDIS_KEY}@${REDIS_HOST}:6380/0"
          fi

          echo "Key Vault seeding complete."

      - name: Refresh Azure auth
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Pre-register resource providers
        run: |
          set -euo pipefail
          # Pre-register Microsoft.App to avoid Azure CLI bug in
          # _register_resource_provider (Python 3.13 string format error)
          # that triggers when auto-registration runs with an expired token.
          az provider register --namespace Microsoft.App --wait || true
          az provider register --namespace Microsoft.OperationalInsights --wait || true

      - name: Deploy services
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          set -euo pipefail

          # ── Inline OIDC token refresh ──
          # Container app creation can take 20+ min each. OIDC tokens expire
          # after ~60 min, so we refresh before each heavy operation.
          refresh_az_login () {
            echo "Refreshing Azure OIDC token..."
            local TOKEN
            TOKEN=$(curl -sS -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
              "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=api://AzureADTokenExchange" \
              | jq -r '.value')
            az login --service-principal \
              -u "${ARM_CLIENT_ID}" -t "${ARM_TENANT_ID}" \
              --federated-token "${TOKEN}" >/dev/null
            az account set -s "${ARM_SUBSCRIPTION_ID}" >/dev/null
          }

          # ── Helper functions ──

          wait_ready () {
            local NAME="$1" MAX="${2:-30}" SLEEP="${3:-10}"
            for i in $(seq 1 "${MAX}"); do
              local STATE RUNNING
              STATE=$(az containerapp show -g "${RG}" -n "${NAME}" \
                --query "properties.provisioningState" -o tsv 2>/dev/null || echo "Unknown")
              [ "${STATE}" = "Succeeded" ] && echo "${NAME} ready." && return 0
              # Check if actually running (InProgress can last forever on Azure)
              RUNNING=$(az containerapp show -g "${RG}" -n "${NAME}" \
                --query "properties.runningStatus" -o tsv 2>/dev/null || echo "")
              if [ "${STATE}" = "InProgress" ] && [ "${RUNNING}" = "Running" ]; then
                echo "${NAME} ready (running)." && return 0
              fi
              [ "${STATE}" = "Failed" ] && echo "ERROR: ${NAME} Failed" && return 1
              echo "  ${NAME}: ${STATE} running=${RUNNING:-?} (${i}/${MAX})"
              sleep "${SLEEP}"
            done
            echo "WARN: Timeout waiting for ${NAME} (state=${STATE}), continuing..."
            return 0
          }

          ensure_identity () {
            local NAME="$1"
            az containerapp identity assign -g "${RG}" -n "${NAME}" --system-assigned >/dev/null || true
            for i in $(seq 1 12); do
              PID=$(az containerapp show -g "${RG}" -n "${NAME}" \
                --query "identity.principalId" -o tsv 2>/dev/null || echo "")
              [ -n "${PID}" ] && echo "Identity: ${NAME} → ${PID}" && return 0
              sleep 5
            done
            echo "ERROR: No identity for ${NAME}"; return 1
          }

          ensure_role () {
            local NAME="$1" SCOPE="$2" ROLE="$3"
            local PID
            PID=$(az containerapp show -g "${RG}" -n "${NAME}" --query "identity.principalId" -o tsv)
            az role assignment create \
              --assignee-object-id "${PID}" --assignee-principal-type ServicePrincipal \
              --role "${ROLE}" --scope "${SCOPE}" >/dev/null 2>&1 || true
          }

          ensure_registry () {
            local NAME="$1"
            for attempt in 1 2 3; do
              az containerapp registry set -g "${RG}" -n "${NAME}" \
                --server "${ACR_LOGIN}" --identity system >/dev/null 2>&1 || true
              sleep 15
              local STATE=$(az containerapp show -g "${RG}" -n "${NAME}" \
                --query "properties.provisioningState" -o tsv 2>/dev/null || echo "Unknown")
              if [ "${STATE}" = "Succeeded" ] || [ "${STATE}" = "InProgress" ]; then
                return 0
              fi
              sleep 30
            done
          }

          wait_for_acr_pull () {
            local NAME="$1"
            local PID
            PID=$(az containerapp show -g "${RG}" -n "${NAME}" --query "identity.principalId" -o tsv)
            for i in $(seq 1 12); do
              COUNT=$(az role assignment list --scope "${ACR_ID}" \
                --query "[?principalId=='${PID}' && roleDefinitionName=='AcrPull'] | length(@)" \
                -o tsv 2>/dev/null || echo "0")
              if [ "${COUNT:-0}" -gt 0 ]; then
                echo "AcrPull confirmed for ${NAME}"; sleep 10; return 0
              fi
              [ "${i}" = "6" ] && ensure_role "${NAME}" "${ACR_ID}" "AcrPull"
              sleep 10
            done
            echo "WARN: AcrPull not confirmed for ${NAME}, continuing anyway..."
          }

          STORAGE_ID=$(az storage account show -g "${RG}" -n "${STORAGE}" --query id -o tsv)

          ensure_all_roles () {
            local NAME="$1"
            ensure_identity "${NAME}"
            ensure_role "${NAME}" "${KV_ID}" "Key Vault Secrets User"
            ensure_role "${NAME}" "${STORAGE_ID}" "Storage Blob Data Contributor"
            ensure_role "${NAME}" "${STORAGE_ID}" "Storage Blob Delegator"
            ensure_role "${NAME}" "${SB_ID}" "Azure Service Bus Data Receiver"
            ensure_role "${NAME}" "${SB_ID}" "Azure Service Bus Data Sender"
          }

          ensure_app () {
            local NAME="$1" INGRESS="$2" PORT="$3"

            if az containerapp show -g "${RG}" -n "${NAME}" >/dev/null 2>&1; then
              STATE=$(az containerapp show -g "${RG}" -n "${NAME}" \
                --query "properties.provisioningState" -o tsv || true)
              echo "App exists: ${NAME} (${STATE})"
              if [ "${STATE}" = "Failed" ]; then
                az containerapp delete -g "${RG}" -n "${NAME}" --yes
              fi
            fi

            if ! az containerapp show -g "${RG}" -n "${NAME}" >/dev/null 2>&1; then
              echo "Creating ${NAME}..."
              az containerapp create -g "${RG}" -n "${NAME}" \
                --environment "${CAE}" \
                --image "mcr.microsoft.com/azuredocs/containerapps-helloworld:latest" \
                --min-replicas 1 --max-replicas 3 >/dev/null
              sleep 5
            fi

            ensure_all_roles "${NAME}"
            ensure_role "${NAME}" "${ACR_ID}" "AcrPull"
            wait_for_acr_pull "${NAME}"
            ensure_registry "${NAME}"

            if [ "${INGRESS}" != "none" ]; then
              az containerapp ingress enable -g "${RG}" -n "${NAME}" \
                --type "${INGRESS}" --target-port "${PORT}" --transport auto >/dev/null 2>&1 || true
              wait_ready "${NAME}"
            fi
          }

          update_app () {
            local NAME="$1"; shift
            for attempt in 1 2 3 4 5; do
              if az containerapp update -g "${RG}" -n "${NAME}" "$@" --no-wait >/dev/null 2>&1; then
                return 0
              fi
              echo "  ${NAME}: update attempt ${attempt} failed (likely InProgress), waiting 30s..."
              sleep 30
            done
            echo "WARN: ${NAME} update failed after 5 attempts, continuing..."
          }

          KV_URI="https://${KV}.vault.azure.net"

          set_kv_secrets () {
            local NAME="$1"; shift
            local SECRET_ARGS=("$@")
            echo "  Setting Key Vault-backed secrets on ${NAME}..."
            az containerapp secret set -g "${RG}" -n "${NAME}" \
              --secrets "${SECRET_ARGS[@]}" >/dev/null 2>&1 || \
              echo "  WARN: secret set returned non-zero for ${NAME}"
          }

          PYTHON_KV_SECRETS=(
            "database-url=keyvaultref:${KV_URI}/secrets/database-url,identityref:system"
            "fal-api-key=keyvaultref:${KV_URI}/secrets/fal-api-key,identityref:system"
            "aml-endpoint-url=keyvaultref:${KV_URI}/secrets/aml-endpoint-url,identityref:system"
            "aml-endpoint-key=keyvaultref:${KV_URI}/secrets/aml-endpoint-key,identityref:system"
            "mollie-api-key=keyvaultref:${KV_URI}/secrets/mollie-api-key,identityref:system"
            "shopify-api-key=keyvaultref:${KV_URI}/secrets/shopify-api-key,identityref:system"
            "shopify-api-secret=keyvaultref:${KV_URI}/secrets/shopify-api-secret,identityref:system"
            "encryption-key=keyvaultref:${KV_URI}/secrets/encryption-key,identityref:system"
            "api-keys=keyvaultref:${KV_URI}/secrets/api-keys,identityref:system"
            "entra-tenant-id=keyvaultref:${KV_URI}/secrets/entra-tenant-id,identityref:system"
            "entra-client-id=keyvaultref:${KV_URI}/secrets/entra-client-id,identityref:system"
            "entra-issuer=keyvaultref:${KV_URI}/secrets/entra-issuer,identityref:system"
          )
          WEBAPI_EXTRA_KV_SECRETS=()
          WEBAPI_EXTRA_ENV_VARS=()
          if [ -n "${REDIS_NAME}" ]; then
            WEBAPI_EXTRA_KV_SECRETS+=("redis-url=keyvaultref:${KV_URI}/secrets/redis-url,identityref:system")
            WEBAPI_EXTRA_ENV_VARS+=("REDIS_URL=secretref:redis-url")
          fi

          SHOPIFY_KV_SECRETS=(
            "shopify-api-key=keyvaultref:${KV_URI}/secrets/shopify-api-key,identityref:system"
            "shopify-api-secret=keyvaultref:${KV_URI}/secrets/shopify-api-secret,identityref:system"
            "opal-service-key=keyvaultref:${KV_URI}/secrets/opal-service-key,identityref:system"
          )

          deploy_python () {
            local NAME="$1" IMAGE="$2" MAX="${3:-30}"
            echo "Deploying ${NAME} → ${IMAGE}"
            ensure_all_roles "${NAME}"
            set_kv_secrets "${NAME}" "${PYTHON_KV_SECRETS[@]}"
            update_app "${NAME}" --image "${IMAGE}" --set-env-vars "${PYTHON_ENV_VARS[@]}"
            sleep 10
            wait_ready "${NAME}" "${MAX}"
          }

          deploy_webapi () {
            local NAME="$1" IMAGE="$2" MAX="${3:-30}"
            echo "Deploying ${NAME} → ${IMAGE}"
            ensure_all_roles "${NAME}"
            set_kv_secrets "${NAME}" "${PYTHON_KV_SECRETS[@]}" "${WEBAPI_EXTRA_KV_SECRETS[@]}"
            update_app "${NAME}" --image "${IMAGE}" --set-env-vars "${PYTHON_ENV_VARS[@]}" "${WEBAPI_EXTRA_ENV_VARS[@]}"
            sleep 10
            wait_ready "${NAME}" "${MAX}"
          }

          deploy_shopify () {
            local NAME="$1" IMAGE="$2"
            echo "Deploying ${NAME} → ${IMAGE}"
            ensure_all_roles "${NAME}"
            set_kv_secrets "${NAME}" "${SHOPIFY_KV_SECRETS[@]}"
            update_app "${NAME}" --image "${IMAGE}" --set-env-vars "${SHOPIFY_ENV_VARS[@]}"
            sleep 10
            wait_ready "${NAME}"
          }

          # ── Build env var arrays ──

          # Sensitive values are now sourced from Key Vault via secretref.
          # Only non-sensitive config values are passed as plain env vars.

          PYTHON_ENV_VARS=(
            "ENV_NAME=${ENV_NAME}"
            "DATABASE_URL=secretref:database-url"
            "STORAGE_ACCOUNT_NAME=${STORAGE}"
            "SERVICEBUS_NAMESPACE=${SB}"
            "QUEUE_BACKEND=azure"
            "AML_ENDPOINT_URL=secretref:aml-endpoint-url"
            "AML_ENDPOINT_KEY=secretref:aml-endpoint-key"
            "BACKGROUND_REMOVAL_PROVIDER=${{ secrets.BACKGROUND_REMOVAL_PROVIDER || 'birefnet' }}"
            "IMAGE_GEN_PROVIDER=${{ secrets.IMAGE_GEN_PROVIDER || 'fal-flux2' }}"
            "FAL_API_KEY=secretref:fal-api-key"
            "ENTRA_TENANT_ID=secretref:entra-tenant-id"
            "ENTRA_CLIENT_ID=secretref:entra-client-id"
            "ENTRA_ISSUER=secretref:entra-issuer"
            "API_KEYS=secretref:api-keys"
            "MOLLIE_API_KEY=secretref:mollie-api-key"
            "PUBLIC_BASE_URL=${{ secrets.PUBLIC_BASE_URL }}"
            "SHOPIFY_API_KEY=secretref:shopify-api-key"
            "SHOPIFY_API_SECRET=secretref:shopify-api-secret"
            "ENCRYPTION_KEY=secretref:encryption-key"
            "CORS_ALLOWED_ORIGINS=${{ secrets.CORS_ALLOWED_ORIGINS }}"
          )

          SHOPIFY_ENV_VARS=(
            "NODE_ENV=production"
            "SHOPIFY_API_KEY=secretref:shopify-api-key"
            "SHOPIFY_API_SECRET=secretref:shopify-api-secret"
            "OPAL_API_URL=${{ secrets.OPAL_API_URL }}"
            "OPAL_SERVICE_KEY=secretref:opal-service-key"
          )

          SCOPE="${{ needs.resolve.outputs.scope }}"

          # ── Bootstrap: ensure all apps exist (only on scope=all) ──

          if [ "${SCOPE}" = "all" ]; then
            ensure_app "opal-web-api-${ENV_NAME}"          "external" 8080
            ensure_app "opal-pipeline-worker-${ENV_NAME}"  "none"     0
            ensure_app "opal-export-worker-${ENV_NAME}"    "none"     0
            ensure_app "opal-billing-service-${ENV_NAME}"  "internal" 8080
            ensure_app "opal-shopify-app-${ENV_NAME}"      "external" 3000
          fi

          # ── Deploy images ──

          BUILT_WEB="${{ needs.build.outputs.web_api }}"
          BUILT_PIPELINE="${{ needs.build.outputs.pipeline_worker }}"
          BUILT_EXPORT="${{ needs.build.outputs.export_worker }}"
          BUILT_BILLING="${{ needs.build.outputs.billing_service }}"
          BUILT_SHOPIFY="${{ needs.build.outputs.shopify_app }}"

          # Create app if it doesn't exist (e.g., first deploy or CAE migration)
          # Uses a public placeholder image first, then sets up identity/ACR/roles
          # before the deploy functions swap to the real image.
          create_if_missing () {
            local NAME="$1" INGRESS="$2" PORT="$3"
            if az containerapp show -g "${RG}" -n "${NAME}" >/dev/null 2>&1; then
              local STATE=$(az containerapp show -g "${RG}" -n "${NAME}" \
                --query "properties.provisioningState" -o tsv 2>/dev/null || echo "Unknown")
              echo "App exists: ${NAME} (${STATE})"
              [ "${STATE}" = "Failed" ] && az containerapp delete -g "${RG}" -n "${NAME}" --yes 2>/dev/null
            fi
            if ! az containerapp show -g "${RG}" -n "${NAME}" >/dev/null 2>&1; then
              echo "Creating ${NAME} in ${CAE}..."
              local CREATE_ARGS=(-g "${RG}" -n "${NAME}" --environment "${CAE}")
              CREATE_ARGS+=(--image "mcr.microsoft.com/azuredocs/containerapps-helloworld:latest")
              CREATE_ARGS+=(--min-replicas 1 --max-replicas 3 --system-assigned)
              if [ "${INGRESS}" != "none" ]; then
                CREATE_ARGS+=(--ingress "${INGRESS}" --target-port "${PORT}")
              fi
              az containerapp create "${CREATE_ARGS[@]}" -o none
              sleep 10
              # Now identity exists — assign all roles including AcrPull
              ensure_all_roles "${NAME}"
              ensure_role "${NAME}" "${ACR_ID}" "AcrPull"
              # Wait for AcrPull to propagate before setting registry
              sleep 30
              az containerapp registry set -g "${RG}" -n "${NAME}" \
                --server "${ACR_LOGIN}" --identity system -o none 2>/dev/null || true
              sleep 10
              echo "Created ${NAME}"
            fi
          }

          refresh_az_login
          create_if_missing "opal-web-api-${ENV_NAME}" external 8080
          refresh_az_login
          create_if_missing "opal-billing-service-${ENV_NAME}" internal 8080
          refresh_az_login
          create_if_missing "opal-pipeline-worker-${ENV_NAME}" none 0
          refresh_az_login
          create_if_missing "opal-export-worker-${ENV_NAME}" none 0
          refresh_az_login
          create_if_missing "opal-shopify-app-${ENV_NAME}" external 3000

          refresh_az_login
          [ "${BUILT_WEB}" = "true" ] && \
            deploy_webapi "opal-web-api-${ENV_NAME}" "${ACR_LOGIN}/opal/web-api:${IMAGE_TAG}"

          [ "${BUILT_BILLING}" = "true" ] && \
            deploy_python "opal-billing-service-${ENV_NAME}" "${ACR_LOGIN}/opal/billing-service:${IMAGE_TAG}"

          # Pipeline worker: 300s timeout (large image with PyTorch + model weights)
          [ "${BUILT_PIPELINE}" = "true" ] && \
            deploy_python "opal-pipeline-worker-${ENV_NAME}" "${ACR_LOGIN}/opal/pipeline-worker:${IMAGE_TAG}" 300

          [ "${BUILT_EXPORT}" = "true" ] && \
            deploy_python "opal-export-worker-${ENV_NAME}" "${ACR_LOGIN}/opal/export-worker:${IMAGE_TAG}"

          [ "${BUILT_SHOPIFY}" = "true" ] && \
            deploy_shopify "opal-shopify-app-${ENV_NAME}" "${ACR_LOGIN}/opal/shopify-app:${IMAGE_TAG}"

          echo "All deployments complete."

      - name: Clean up Storage network rules
        if: always()
        run: |
          set -euo pipefail
          echo "Removing runner IP from Storage firewall..."
          az storage account network-rule remove -g "${RG}" --account-name "${STORAGE}" \
            --ip-address "${RUNNER_IP}" -o none 2>/dev/null || true
          # NOTE: Do NOT set default-action to Deny until Container Apps are
          # inside the VNet (vnetContainerApps=true). Without VNet, apps access
          # storage over public internet and would be blocked by Deny rules.

      - name: Print endpoints
        run: |
          set -euo pipefail
          for APP in "opal-web-api-${ENV_NAME}" "opal-shopify-app-${ENV_NAME}"; do
            FQDN=$(az containerapp show -g "${RG}" -n "${APP}" \
              --query properties.configuration.ingress.fqdn -o tsv 2>/dev/null || echo "no-ingress")
            echo "${APP}: https://${FQDN}"
          done
