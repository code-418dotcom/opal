name: Build & Deploy Apps (dev) - Smart

on:
  workflow_dispatch: {}
  push:
    branches: [ "main" ]
    paths:
      - "src/**"
      - "migrations/**"

permissions:
  id-token: write
  contents: read

env:
  ENV_NAME: dev
  LOCATION: westeurope
  RG_NAME: opal-dev-rg
  IMAGE_TAG: ${{ github.sha }}

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      shared: ${{ steps.filter.outputs.shared }}
      web_api: ${{ steps.filter.outputs.web_api }}
      export_worker: ${{ steps.filter.outputs.export_worker }}
      pipeline_worker: ${{ steps.filter.outputs.pipeline_worker }}
      billing_service: ${{ steps.filter.outputs.billing_service }}
      aml_sd_stub: ${{ steps.filter.outputs.aml_sd_stub }}
    steps:
      - uses: actions/checkout@v4
      - name: Paths filter
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            shared:
              - 'src/shared/**'
            web_api:
              - 'src/web_api/**'
            export_worker:
              - 'src/export_worker/**'
            pipeline_worker:
              - 'src/pipeline_worker/**'
            billing_service:
              - 'src/billing_service/**'
            aml_sd_stub:
              - 'src/aml_sd_stub/**'

  build_and_deploy:
    name: Build + Deploy (dev)
    runs-on: ubuntu-latest
    needs: [changes]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install helper tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Decide what to build/deploy
        id: decide
        run: |
          set -euo pipefail

          SHARED="${{ needs.changes.outputs.shared }}"
          WEB_API="${{ needs.changes.outputs.web_api }}"
          EXPORT_WORKER="${{ needs.changes.outputs.export_worker }}"
          PIPELINE="${{ needs.changes.outputs.pipeline_worker }}"
          BILLING="${{ needs.changes.outputs.billing_service }}"
          AML="${{ needs.changes.outputs.aml_sd_stub }}"

          # If shared changed, everything rebuilds/redeploys
          if [ "${SHARED}" = "true" ]; then
            WEB_API=true
            EXPORT_WORKER=true
            PIPELINE=true
            BILLING=true
            AML=true
          fi

          echo "web_api=${WEB_API}" >> "$GITHUB_OUTPUT"
          echo "export_worker=${EXPORT_WORKER}" >> "$GITHUB_OUTPUT"
          echo "pipeline_worker=${PIPELINE}" >> "$GITHUB_OUTPUT"
          echo "billing_service=${BILLING}" >> "$GITHUB_OUTPUT"
          echo "aml_sd_stub=${AML}" >> "$GITHUB_OUTPUT"

      - name: Discover infra in Azure (dev RG)
        run: |
          set -euo pipefail

          ACR_NAME=$(az acr list -g "${RG_NAME}" --query "[0].name" -o tsv)
          [ -n "${ACR_NAME}" ] || (echo "ERROR: No ACR in ${RG_NAME}"; exit 1)
          ACR_LOGIN=$(az acr show -n "${ACR_NAME}" -g "${RG_NAME}" --query "loginServer" -o tsv)
          ACR_ID=$(az acr show -n "${ACR_NAME}" -g "${RG_NAME}" --query "id" -o tsv)

          STORAGE=$(az storage account list -g "${RG_NAME}" --query "[0].name" -o tsv)
          [ -n "${STORAGE}" ] || (echo "ERROR: No Storage Account in ${RG_NAME}"; exit 1)

          SB=$(az servicebus namespace list -g "${RG_NAME}" --query "[0].name" -o tsv)
          [ -n "${SB}" ] || (echo "ERROR: No Service Bus Namespace in ${RG_NAME}"; exit 1)

          SB_ID=$(az servicebus namespace show -g "${RG_NAME}" -n "${SB}" --query id -o tsv)
          [ -n "${SB_ID}" ] || (echo "ERROR: No Service Bus ID in ${RG_NAME}"; exit 1)

          CAE=$(az containerapp env list -g "${RG_NAME}" --query "[0].name" -o tsv)
          [ -n "${CAE}" ] || (echo "ERROR: No Container Apps Environment in ${RG_NAME}"; exit 1)

          PG_SERVER=$(az resource list -g "${RG_NAME}" --resource-type "Microsoft.DBforPostgreSQL/flexibleServers" --query "[?contains(name,'-pg-ne')].name | [0]" -o tsv)
          [ -n "${PG_SERVER}" ] || PG_SERVER=$(az resource list -g "${RG_NAME}" --resource-type "Microsoft.DBforPostgreSQL/flexibleServers" --query "[0].name" -o tsv)
          [ -n "${PG_SERVER}" ] || (echo "ERROR: No Postgres Flexible Server in ${RG_NAME}"; exit 1)

          echo "ACR_NAME=${ACR_NAME}" >> $GITHUB_ENV
          echo "ACR_LOGIN=${ACR_LOGIN}" >> $GITHUB_ENV
          echo "ACR_ID=${ACR_ID}" >> $GITHUB_ENV
          echo "STORAGE=${STORAGE}" >> $GITHUB_ENV
          echo "SB=${SB}" >> $GITHUB_ENV
          echo "SB_ID=${SB_ID}" >> $GITHUB_ENV
          echo "CAE=${CAE}" >> $GITHUB_ENV
          echo "PG_SERVER=${PG_SERVER}" >> $GITHUB_ENV

      - name: Login to ACR (for docker push)
        run: |
          set -euo pipefail
          az acr login --name "${ACR_NAME}"

      - name: Ensure Service Bus queues exist (idempotent)
        run: |
          set -euo pipefail
          for Q in bg-removal scene-gen upscale; do
            if ! az servicebus queue show -g "${RG_NAME}" --namespace-name "${SB}" --name "${Q}" >/dev/null 2>&1; then
              echo "Creating queue: ${Q}"
              az servicebus queue create -g "${RG_NAME}" --namespace-name "${SB}" \
                --name "${Q}" \
                --max-delivery-count 5 \
                --lock-duration PT5M \
                --default-message-time-to-live P7D
            else
              echo "Queue already exists: ${Q}"
            fi
          done

      - name: Ensure blob containers exist (idempotent)
        run: |
          set -euo pipefail
          for CONTAINER in raw outputs exports; do
            if ! az storage container show --account-name "${STORAGE}" --name "${CONTAINER}" --auth-mode login >/dev/null 2>&1; then
              echo "Creating container: ${CONTAINER}"
              az storage container create --account-name "${STORAGE}" --name "${CONTAINER}" --auth-mode login --public-access off
            else
              echo "Container already exists: ${CONTAINER}"
            fi
          done

      - name: Run DB migrations (idempotent)
        env:
          PGPASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
        run: |
          set -euo pipefail
          PG_HOST="${PG_SERVER}.postgres.database.azure.com"
          echo "Running migrations against ${PG_HOST}..."
          for SQL_FILE in migrations/*.sql; do
            echo "  Applying ${SQL_FILE}..."
            psql "host=${PG_HOST} port=5432 dbname=opal user=opaladmin sslmode=require" \
              -f "${SQL_FILE}" -v ON_ERROR_STOP=1
          done
          echo "Migrations complete."

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push images (only what changed)
        run: |
          set -euo pipefail

          build_push () {
            local NAME="$1"
            local DOCKERFILE="$2"
            echo "Building ${NAME} using ${DOCKERFILE}"
            # Tag with both SHA (for traceability) and latest (for fallback on new environments)
            docker buildx build --platform linux/amd64 \
              -t "${ACR_LOGIN}/${NAME}:${IMAGE_TAG}" \
              -t "${ACR_LOGIN}/${NAME}:latest" \
              -f "${DOCKERFILE}" . --push
          }

          if [ "${{ steps.decide.outputs.web_api }}" = "true" ]; then
            build_push "opal/web-api" "src/web_api/Dockerfile"
          fi
          if [ "${{ steps.decide.outputs.pipeline_worker }}" = "true" ]; then
            build_push "opal/pipeline-worker" "src/pipeline_worker/Dockerfile"
          fi
          if [ "${{ steps.decide.outputs.export_worker }}" = "true" ]; then
            build_push "opal/export-worker" "src/export_worker/Dockerfile"
          fi
          if [ "${{ steps.decide.outputs.billing_service }}" = "true" ]; then
            build_push "opal/billing-service" "src/billing_service/Dockerfile"
          fi
          if [ "${{ steps.decide.outputs.aml_sd_stub }}" = "true" ]; then
            build_push "opal/aml-sd-stub" "src/aml_sd_stub/Dockerfile"
          fi

      - name: Azure Login (refresh after build)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify Container Apps exist
        run: |
          set -euo pipefail

          # Quick sanity check — all apps must exist before we deploy images.
          # RBAC provisioning is handled separately (provision-rbac workflow or manual).
          APPS=(
            "opal-web-api-${ENV_NAME}"
            "opal-billing-service-${ENV_NAME}"
            "opal-pipeline-worker-${ENV_NAME}"
            "opal-export-worker-${ENV_NAME}"
          )

          for APP in "${APPS[@]}"; do
            STATE=$(az containerapp show -g "${RG_NAME}" -n "${APP}" \
              --query "properties.provisioningState" -o tsv 2>/dev/null || echo "NOT_FOUND")
            if [ "${STATE}" = "NOT_FOUND" ]; then
              echo "ERROR: ${APP} does not exist. Run the provision-rbac workflow first."
              exit 1
            fi
            echo "✓ ${APP} (${STATE})"
          done

      - name: Deploy images (only affected apps)
        run: |
          set -euo pipefail

          wait_ready () {
            local NAME="$1"
            local MAX="${2:-60}"
            local SLEEP="${3:-5}"

            echo "Waiting for ${NAME} to be ready (provisioningState=Succeeded)..."
            for i in $(seq 1 "${MAX}"); do
              local STATE
              STATE=$(az containerapp show -g "${RG_NAME}" -n "${NAME}" --query "properties.provisioningState" -o tsv 2>/dev/null || true)

              if [ "${STATE}" = "Succeeded" ]; then
                echo "${NAME} is ready."
                return 0
              fi

              if [ "${STATE}" = "Failed" ]; then
                echo "ERROR: ${NAME} provisioningState=Failed"
                az containerapp show -g "${RG_NAME}" -n "${NAME}" -o jsonc || true
                return 1
              fi

              echo "  ${NAME}: provisioningState=${STATE:-<none>} (attempt ${i}/${MAX})"
              sleep "${SLEEP}"
            done

            echo "ERROR: Timeout waiting for ${NAME} to reach provisioningState=Succeeded"
            az containerapp show -g "${RG_NAME}" -n "${NAME}" -o jsonc || true
            return 1
          }

          DB_USER="opaladmin"
          DB_PASS="${{ secrets.POSTGRES_ADMIN_PASSWORD }}"
          DATABASE_URL="postgresql+psycopg://${DB_USER}:${DB_PASS}@${PG_SERVER}.postgres.database.azure.com:5432/opal?sslmode=require"

          AML_ENDPOINT_URL="${{ secrets.AML_ENDPOINT_URL }}"
          AML_ENDPOINT_KEY="${{ secrets.AML_ENDPOINT_KEY }}"

          BACKGROUND_REMOVAL_PROVIDER="${{ secrets.BACKGROUND_REMOVAL_PROVIDER || 'birefnet' }}"
          IMAGE_GEN_PROVIDER="${{ secrets.IMAGE_GEN_PROVIDER || 'fal-flux2' }}"
          FAL_API_KEY="${{ secrets.FAL_API_KEY }}"

          # Auth
          ENTRA_TENANT_ID="${{ secrets.ENTRA_TENANT_ID }}"
          ENTRA_CLIENT_ID="${{ secrets.ENTRA_CLIENT_ID }}"
          ENTRA_ISSUER="${{ secrets.ENTRA_ISSUER }}"
          API_KEYS="${{ secrets.API_KEYS }}"

          # Billing
          MOLLIE_API_KEY="${{ secrets.MOLLIE_API_KEY }}"
          PUBLIC_BASE_URL="${{ secrets.PUBLIC_BASE_URL }}"

          # Integrations
          SHOPIFY_API_KEY="${{ secrets.SHOPIFY_API_KEY }}"
          SHOPIFY_API_SECRET="${{ secrets.SHOPIFY_API_SECRET }}"
          ENCRYPTION_KEY="${{ secrets.ENCRYPTION_KEY }}"

          # CORS
          CORS_ALLOWED_ORIGINS="${{ secrets.CORS_ALLOWED_ORIGINS }}"

          ENV_VARS=(
            "ENV_NAME=${ENV_NAME}"
            "DATABASE_URL=${DATABASE_URL}"
            "STORAGE_ACCOUNT_NAME=${STORAGE}"
            "SERVICEBUS_NAMESPACE=${SB}"
            "AML_ENDPOINT_URL=${AML_ENDPOINT_URL}"
            "AML_ENDPOINT_KEY=${AML_ENDPOINT_KEY}"
            "BACKGROUND_REMOVAL_PROVIDER=${BACKGROUND_REMOVAL_PROVIDER}"
            "IMAGE_GEN_PROVIDER=${IMAGE_GEN_PROVIDER}"
            "FAL_API_KEY=${FAL_API_KEY}"
            "ENTRA_TENANT_ID=${ENTRA_TENANT_ID}"
            "ENTRA_CLIENT_ID=${ENTRA_CLIENT_ID}"
            "ENTRA_ISSUER=${ENTRA_ISSUER}"
            "API_KEYS=${API_KEYS}"
            "MOLLIE_API_KEY=${MOLLIE_API_KEY}"
            "PUBLIC_BASE_URL=${PUBLIC_BASE_URL}"
            "SHOPIFY_API_KEY=${SHOPIFY_API_KEY}"
            "SHOPIFY_API_SECRET=${SHOPIFY_API_SECRET}"
            "ENCRYPTION_KEY=${ENCRYPTION_KEY}"
            "CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}"
          )

          deploy_image () {
            local NAME="$1"
            local IMAGE="$2"
            local MAX="${3:-60}"
            echo "Deploying ${NAME} -> ${IMAGE}"
            az containerapp update -g "${RG_NAME}" -n "${NAME}" \
              --image "${IMAGE}" \
              --set-env-vars "${ENV_VARS[@]}" >/dev/null
            wait_ready "${NAME}" "${MAX}"
          }

          WEB="opal-web-api-${ENV_NAME}"
          BILL="opal-billing-service-${ENV_NAME}"
          PIPELINE="opal-pipeline-worker-${ENV_NAME}"
          EXPORT="opal-export-worker-${ENV_NAME}"

          # Deploy images — only for services where a build was triggered.
          [ "${{ steps.decide.outputs.web_api }}" = "true" ] && \
            deploy_image "${WEB}"  "${ACR_LOGIN}/opal/web-api:${IMAGE_TAG}"

          [ "${{ steps.decide.outputs.billing_service }}" = "true" ] && \
            deploy_image "${BILL}" "${ACR_LOGIN}/opal/billing-service:${IMAGE_TAG}"

          # Pipeline worker has a large image (~4GB with PyTorch + ONNX models)
          # so it gets a 300-second timeout for cold starts.
          [ "${{ steps.decide.outputs.pipeline_worker }}" = "true" ] && \
            deploy_image "${PIPELINE}" "${ACR_LOGIN}/opal/pipeline-worker:${IMAGE_TAG}" 300

          [ "${{ steps.decide.outputs.export_worker }}" = "true" ] && \
            deploy_image "${EXPORT}" "${ACR_LOGIN}/opal/export-worker:${IMAGE_TAG}"

          echo "Deployments complete."

      - name: Print Web API URL
        run: |
          set -euo pipefail
          FQDN=$(az containerapp show \
            --resource-group "${RG_NAME}" \
            --name "opal-web-api-${ENV_NAME}" \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "Web API available at: https://${FQDN}"
          echo "Try: https://${FQDN}/healthz"
